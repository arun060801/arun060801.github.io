<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found | N Arun Kumar</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { bg: '#05060A', primary: '#00FF9D', card: '#151A24', surface: '#10131A' }, fontFamily: { mono: ['JetBrains Mono', 'monospace'] } } } }
    </script>
    <style>
        .bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,255,157,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,157,0.1) 1px, transparent 1px); background-size: 40px 40px; z-index: -3; opacity: 0.3; }
        .bg-glow-layer { position: fixed; inset: 0; background: radial-gradient(circle at center, rgba(0, 255, 157, 0.05), transparent 70%); z-index: -2; pointer-events: none; }
        .glass-card { background: var(--surface); border: 1px solid var(--card); border-radius: 12px; transition: all 0.3s; }
        .glass-card:hover { border-color: rgba(0, 255, 157, 0.3); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body class="bg-bg text-white h-screen flex flex-col items-center justify-center overflow-hidden relative">
    <div class="bg-grid"></div>
    <div class="bg-glow-layer"></div>
    <div class="text-center z-10 p-8 glass-card border border-white/10 max-w-lg w-full">
        <h1 class="text-8xl font-bold text-primary mb-4 font-mono">404</h1>
        <h2 class="text-2xl mb-6 font-mono text-gray-300">Target Not Found</h2>
        <div class="bg-black/50 p-4 rounded text-left font-mono text-sm text-gray-400 mb-8 border border-white/5">
            <p><span class="text-red-500">Error:</span> Resource at current path does not exist.</p>
            <p class="mt-2">> Analyzing potential routes...</p>
            <p class="text-primary mt-1">> Route to root (/) verified.</p>
        </div>
        <a href="/" class="inline-block px-6 py-3 border border-primary text-primary font-mono hover:bg-primary hover:text-bg transition-colors">
            Return to Base
        </a>
    </div>
</body>
</html>
