<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#05060A"/>
  
  <!-- Grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Content -->
  <text x="100" y="250" font-family="'Inter', sans-serif" font-size="90" font-weight="bold" fill="#F8FAFC">N Arun Kumar</text>
  <text x="100" y="350" font-family="'JetBrains Mono', monospace" font-size="40" fill="#00FF9D">> Penetration Tester</text>
  <text x="100" y="420" font-family="'JetBrains Mono', monospace" font-size="30" fill="#00B8FF">Web Security | Active Directory</text>
  
  <!-- Decorative Elements -->
  <rect x="100" y="500" width="100" height="10" fill="#9D4EDD"/>
  
  <!-- Terminal window outline -->
  <rect x="700" y="150" width="400" height="300" rx="10" fill="none" stroke="#00FF9D" stroke-width="2"/>
  <circle cx="730" cy="180" r="8" fill="#FF5F56"/>
  <circle cx="760" cy="180" r="8" fill="#FFBD2E"/>
  <circle cx="790" cy="180" r="8" fill="#27C93F"/>
  <line x1="700" y1="210" x2="1100" y2="210" stroke="#00FF9D" stroke-width="2"/>
  <text x="730" y="270" font-family="monospace" font-size="24" fill="#F8FAFC">ACCESS GRANTED_</text>
</svg>
